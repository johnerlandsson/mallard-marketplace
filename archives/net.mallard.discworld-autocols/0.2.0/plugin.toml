id = "net.mallard.discworld-autocols"
name = "Discworld Autocols"
version = "0.2.0"
language = "lua"
entry = "src/main.lua"
mallard_api_version = "1.0"
minimum_app_version = "0.0.1"
authors = ["mallard examples"]
license = "MIT"

[permissions]
sends = true

[worlds]
match = ["discworld.starturtle.net:*"]

[settings.extra_commands]
type = "string"
default = ""
label = "Extra commands to wrap"
description = "Additional commands to wrap with cols toggling, beyond the built-in list. Separate entries with commas or whitespace. Use a pipe to list synonyms for one entry (e.g. `skp|skillpoints`). Settings are saved per world, so each character can have their own list."
