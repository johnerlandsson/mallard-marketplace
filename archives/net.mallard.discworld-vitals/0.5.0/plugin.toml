id = "net.mallard.discworld-vitals"
name = "Discworld Vitals"
version = "0.5.0"
description = "A vitals panel for Discworld - XP, XP rate, shields, HP, GP, burden - and a `skills raw` parser for sharing skill state with other plugins"
language = "lua"
entry = "src/main.lua"
mallard_api_version = "1.0"
minimum_app_version = "0.6.0"
authors = ["Wizard Quack"]
license = "MIT"

[permissions]
# char.info is mirrored into world vars (`char.info.<key>`) and re-broadcast as
# `net.mallard.discworld.char_info` so discworld-grouping can read it without
# needing its own gmcp permission.
gmcp_access = ["char.vitals", "char.info", "char.info.*"]
# Required for /skills-refresh, which sends `skills raw` to drive the parser.
sends = true

[worlds]
match = ["discworld.starturtle.net:*"]

[gmcp]
advertise = [
  "char.login",
  "char.info",
  "char.vitals",
  "room.info",
  "room.map",
  "comm.channel",
]

[panels.vitals]
title              = "Vitals"
entry              = "ui/vitals.html"
default_dock       = "right"
default_size       = { width = 260, height = 240 }

[settings.gp_regen]
type = "number"
default = 3
min = 2
max = 5
label = "GP regen per round"
description = "GP regenerated per ~2s combat round between authoritative updates."

[settings.xp_window]
type = "enum"
default = "1h"
label = "XP/hour averaging window"
description = "Time window over which XP/hour is averaged."
choices = [
  { value = "5m",  label = "5 minutes"  },
  { value = "30m", label = "30 minutes" },
  { value = "1h",  label = "1 hour"     },
]

[settings.show_xp_gains]
type = "bool"
default = true
label = "Announce XP gains"
description = "Print a note to the game output each time XP increases by at least the threshold below."

[settings.xp_gain_threshold]
type = "number"
default = 1000
min = 1
max = 1000000
label = "XP gain threshold"
description = "Minimum XP delta required to print a gain note."
