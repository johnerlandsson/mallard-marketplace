# Requires the v0.1.1 tag to exist on wizardquack/mallardx-discworld-mapper.
# The mapper has `discworld-mapper.mallardx` committed in-tree alongside
# the source, but the marketplace pipeline rebuilds from source — the
# committed archive bytes are not trusted. The build below recreates the
# archive deterministically using the pre-built `ui/data/rooms.js` and
# `ui/maps/*.png` assets that ARE committed in the mapper repo.
#
# Tag cut by maintainer at the operational hand-off; see
# `RUNBOOK.md` §Bootstrap.

withdrawn = true
withdrawn_reason = "Unmaintained — no longer recommended for new installs."

[source]
repo     = "wizardquack/mallardx-discworld-mapper"
ref      = "v0.1.1"
build    = "rm -f discworld-mapper.mallardx && zip -qr discworld-mapper.mallardx plugin.toml src ui"
artifact = "discworld-mapper.mallardx"

[meta]
homepage = "https://github.com/wizardquack/mallardx-discworld-mapper"
tags     = ["discworld", "mapper", "panel"]
